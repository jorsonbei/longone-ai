    <script>
      // Prevent "Cannot set property fetch of #<Window> which has only a getter" error
      // encountered when third-party libraries try to polyfill fetch.
      try {
        const nativeFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          get: () => nativeFetch,
          set: () => {
            // Ignore attempts to overwrite fetch
          },
          configurable: true,
        });
        
        const nativeGlobalThisFetch = globalThis.fetch;
        Object.defineProperty(globalThis, 'fetch', {
          get: () => nativeGlobalThisFetch,
          set: () => {
            // Ignore attempts to overwrite fetch
          },
          configurable: true,
        });
      } catch (e) {
        // Ignored
      }
    </script>
